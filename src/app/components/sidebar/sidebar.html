<aside
  class="w-64 h-screen bg-white border-r border-slate-200 flex flex-col justify-between shadow-sm sticky top-0"
>
  <div>
    <div
      class="h-20 flex items-center justify-center border-b border-slate-100 cursor-pointer"
      routerLink="/home"
    >
      <i class="pi pi-th-large text-5xl text-[var(--p-primary-color)] mr-3"></i>
      <span class="font-extrabold text-2xl tracking-tight text-slate-900"
        >Nexos<span class="text-[var(--p-primary-color)]">ERP</span></span
      >
    </div>

    <div class="p-4 mt-2">
      <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-2 block"
        >Principal</span
      >
      <p-panelMenu [model]="menuItems" styleClass="w-full border-none"></p-panelMenu>
    </div>
  </div>

  <div class="p-4 border-t border-slate-100 flex flex-col gap-4">
    <p-button
      label="Cerrar Sesión"
      icon="pi pi-sign-out"
      severity="danger"
      [text]="true"
      styleClass="w-full font-bold"
      (onClick)="logout()"
    >
    </p-button>

    <div class="text-center">
      <span class="text-xs font-semibold text-slate-400 px-3 py-1">v1.0.1 NexosERP © 2026</span>
    </div>
  </div>
</aside>
