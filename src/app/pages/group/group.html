<app-main-layout pageTitle="Gestión de Grupo">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <p-card header="Total" styleClass="shadow-sm border border-slate-200 h-full">
      <div class="flex flex-col gap-2 mt-4">
        <label for="total" class="text-sm font-semibold text-slate-700">Cantidad Total</label>
        <p-inputNumber
          [(ngModel)]="totalValue"
          inputId="total"
          mode="decimal"
          [showButtons]="true"
          styleClass="w-full"
          [inputStyle]="{ width: '100%' }"
        >
        </p-inputNumber>
      </div>
    </p-card>

    <p-card header="Advances" styleClass="shadow-sm border border-slate-200 h-full min-h-[250px]">
      <div class="flex flex-col items-center justify-center h-full text-slate-400 opacity-70 mt-4">
        <i class="pi pi-chart-bar text-5xl mb-3"></i>
        <p class="font-medium">Sin avances registrados</p>
      </div>
    </p-card>
  </div>
</app-main-layout>
