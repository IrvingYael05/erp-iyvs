<div class="min-h-screen bg-[#f8fafc] p-8">
  <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800">Panel de Control General</h1>
      <p-button label="Cerrar Sesión" icon="pi pi-sign-out" severity="danger" [outlined]="true" (onClick)="logout()"></p-button>
    </div>
    
    <div class="bg-[var(--p-primary-50)] border border-[var(--p-primary-100)] p-6 rounded-xl">
      <h2 class="text-xl font-semibold text-[var(--p-primary-700)] mb-2">¡Bienvenido, {{ user?.nombreCompleto }}!</h2>
      <p class="text-slate-600">Has accedido correctamente a una ruta protegida por el sistema.</p>
    </div>
  </div>
</div>
